<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#52B788"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E76F51"/>
    </linearGradient>
    <linearGradient id="land1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74C69D"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
    <linearGradient id="land2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#E07A5F"/>
    </linearGradient>
  </defs>

  <!-- frame -->
  <rect width="390" height="844" rx="44" fill="#FFFFFF"/>

  <!-- status bar -->
  <text x="32" y="34" font-family="Inter, Arial" font-size="14" font-weight="700" fill="#1B4332">9:41</text>
  <g transform="translate(322,22)" fill="#1B4332">
    <rect x="0" y="6" width="4" height="8" rx="1"/>
    <rect x="6" y="4" width="4" height="10" rx="1"/>
    <rect x="12" y="2" width="4" height="12" rx="1"/>
    <rect x="22" y="3" width="20" height="11" rx="3" fill="none" stroke="#1B4332" stroke-width="1.2"/>
    <rect x="24" y="5" width="14" height="7" rx="1.5"/>
  </g>

  <!-- hero section -->
  <rect x="0" y="50" width="390" height="280" fill="url(#hero)"/>
  <text x="24" y="92" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#95D5B2" letter-spacing="2">GOOD MORNING, ADAEZE</text>
  <text x="24" y="138" font-family="Inter, Arial" font-size="32" font-weight="800" fill="#FFFFFF">Own farmland.</text>
  <text x="24" y="172" font-family="Inter, Arial" font-size="32" font-weight="800" fill="#FFD166">Earn the harvest.</text>
  <text x="24" y="204" font-family="Inter, Arial" font-size="14" fill="#D8F3DC">Pay outright or in 12 installments.</text>

  <!-- Search bar -->
  <rect x="24" y="232" width="342" height="56" rx="28" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="52" cy="260" r="9" fill="none" stroke="#2D6A4F" stroke-width="2"/>
  <line x1="59" y1="267" x2="68" y2="276" stroke="#2D6A4F" stroke-width="2" stroke-linecap="round"/>
  <text x="84" y="265" font-family="Inter, Arial" font-size="14" fill="#6B7280">Search Ogun, Oyo, Kaduna...</text>
  <rect x="304" y="244" width="50" height="32" rx="16" fill="#1B4332"/>
  <text x="329" y="265" font-family="Inter, Arial" font-size="11" font-weight="700" fill="#FFD166" text-anchor="middle">FILTER</text>

  <!-- Quick stats -->
  <rect x="24" y="356" width="164" height="92" rx="20" fill="url(#card1)"/>
  <text x="40" y="384" font-family="Inter, Arial" font-size="11" font-weight="600" fill="#D8F3DC" letter-spacing="1.5">PORTFOLIO</text>
  <text x="40" y="416" font-family="Inter, Arial" font-size="22" font-weight="800" fill="#FFFFFF">₦4,250,000</text>
  <text x="40" y="436" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#95D5B2">▲ 18.4% YoY</text>

  <rect x="202" y="356" width="164" height="92" rx="20" fill="url(#card2)"/>
  <text x="218" y="384" font-family="Inter, Arial" font-size="11" font-weight="600" fill="#FFE8D6" letter-spacing="1.5">NEXT INSTALLMENT</text>
  <text x="218" y="416" font-family="Inter, Arial" font-size="22" font-weight="800" fill="#FFFFFF">₦125,000</text>
  <text x="218" y="436" font-family="Inter, Arial" font-size="12" font-weight="600" fill="#FFE8D6">Due May 28</text>

  <!-- Section header -->
  <text x="24" y="490" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#1B4332">Featured farmlands</text>
  <text x="320" y="490" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#2D6A4F">See all →</text>

  <!-- Listing card 1 -->
  <rect x="24" y="510" width="342" height="148" rx="20" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="24" y="510" width="120" height="148" rx="20" fill="url(#land1)"/>
  <!-- pseudo aerial -->
  <g opacity="0.6">
    <rect x="38" y="540" width="92" height="14" fill="#1B4332"/>
    <rect x="38" y="560" width="92" height="14" fill="#40916C"/>
    <rect x="38" y="580" width="92" height="14" fill="#1B4332"/>
    <rect x="38" y="600" width="92" height="14" fill="#40916C"/>
    <rect x="38" y="620" width="92" height="14" fill="#1B4332"/>
  </g>
  <rect x="34" y="520" width="50" height="22" rx="11" fill="#FFD166"/>
  <text x="59" y="535" font-family="Inter, Arial" font-size="10" font-weight="800" fill="#1B4332" text-anchor="middle">VERIFIED</text>

  <text x="160" y="540" font-family="Inter, Arial" font-size="15" font-weight="800" fill="#1B4332">Ofada Ridge Estate</text>
  <text x="160" y="560" font-family="Inter, Arial" font-size="12" fill="#6B7280">Ewekoro, Ogun · 2.5 acres</text>

  <rect x="160" y="572" width="60" height="22" rx="11" fill="#D8F3DC"/>
  <text x="190" y="587" font-family="Inter, Arial" font-size="10" font-weight="700" fill="#1B4332" text-anchor="middle">CASSAVA</text>
  <rect x="226" y="572" width="64" height="22" rx="11" fill="#FFE8D6"/>
  <text x="258" y="587" font-family="Inter, Arial" font-size="10" font-weight="700" fill="#774936" text-anchor="middle">12-MO ROI</text>

  <text x="160" y="624" font-family="Inter, Arial" font-size="11" fill="#6B7280">From</text>
  <text x="160" y="646" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#1B4332">₦85,000<tspan font-size="11" font-weight="500" fill="#6B7280">/month</tspan></text>

  <!-- Listing card 2 -->
  <rect x="24" y="676" width="342" height="118" rx="20" fill="#F8F9FA" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="24" y="676" width="100" height="118" rx="20" fill="url(#land2)"/>
  <g opacity="0.5">
    <circle cx="74" cy="735" r="22" fill="#774936"/>
    <circle cx="50" cy="755" r="14" fill="#774936"/>
    <circle cx="98" cy="755" r="14" fill="#774936"/>
  </g>
  <text x="140" y="708" font-family="Inter, Arial" font-size="15" font-weight="800" fill="#1B4332">Saki Cocoa Plantation</text>
  <text x="140" y="726" font-family="Inter, Arial" font-size="12" fill="#6B7280">Oyo State · 5 acres</text>
  <text x="140" y="772" font-family="Inter, Arial" font-size="18" font-weight="800" fill="#1B4332">₦210,000<tspan font-size="11" font-weight="500" fill="#6B7280">/month</tspan></text>

  <!-- Tab bar -->
  <rect x="0" y="800" width="390" height="44" fill="#FFFFFF"/>
  <line x1="0" y1="800" x2="390" y2="800" stroke="#E5E7EB" stroke-width="1"/>
  <g font-family="Inter, Arial" font-size="10" font-weight="700">
    <circle cx="55" cy="816" r="3" fill="#2D6A4F"/>
    <text x="55" y="836" fill="#2D6A4F" text-anchor="middle">Home</text>
    <text x="143" y="836" fill="#9CA3AF" text-anchor="middle">Explore</text>
    <text x="231" y="836" fill="#9CA3AF" text-anchor="middle">Portfolio</text>
    <text x="319" y="836" fill="#9CA3AF" text-anchor="middle">Account</text>
  </g>
</svg>
